<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Risk Assessment - 创业风险评估</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        /* Progress Steps */
        .progress-steps {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .progress-step {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #8892b0;
        }
        
        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        
        .progress-step.active {
            color: #e94560;
        }
        
        .progress-step.active .step-number {
            background: #e94560;
            color: #fff;
        }
        
        .progress-step.completed {
            color: #2ecc71;
        }
        
        .progress-step.completed .step-number {
            background: #2ecc71;
            color: #fff;
        }
        
        .step-connector {
            width: 40px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .step-connector.active {
            background: #e94560;
        }
        
        /* Assessment Form */
        .assessment-form {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ccd6f6;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .question-group {
            margin-bottom: 25px;
        }
        
        .question-label {
            font-size: 1rem;
            margin-bottom: 12px;
            color: #fff;
        }
        
        .question-hint {
            font-size: 0.85rem;
            color: #8892b0;
            margin-bottom: 10px;
        }
        
        .rating-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .rating-option {
            flex: 1;
            min-width: 100px;
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .rating-option:hover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }
        
        .rating-option.selected {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.2);
        }
        
        .rating-option.selected.risk-1 { border-color: #2ecc71; background: rgba(46, 204, 113, 0.2); }
        .rating-option.selected.risk-2 { border-color: #f1c40f; background: rgba(241, 196, 15, 0.2); }
        .rating-option.selected.risk-3 { border-color: #e67e22; background: rgba(230, 126, 34, 0.2); }
        .rating-option.selected.risk-4 { border-color: #e74c3c; background: rgba(231, 76, 60, 0.2); }
        .rating-option.selected.risk-5 { border-color: #c0392b; background: rgba(192, 57, 43, 0.3); }
        
        .rating-label {
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .rating-desc {
            font-size: 0.75rem;
            color: #8892b0;
            margin-top: 5px;
        }
        
        /* Buttons */
        .btn-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .btn {
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none;
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        
        .btn-secondary:hover {
            border-color: #e94560;
        }
        
        /* Results */
        .results-panel {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .results-panel.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .overall-score {
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 30px;
        }
        
        .score-value {
            font-size: 4rem;
            font-weight: 700;
        }
        
        .score-value.low { color: #2ecc71; }
        .score-value.medium { color: #f1c40f; }
        .score-value.high { color: #e74c3c; }
        
        .score-label {
            font-size: 1.2rem;
            color: #8892b0;
            margin-top: 10px;
        }
        
        .score-description {
            margin-top: 15px;
            color: #ccd6f6;
            line-height: 1.6;
        }
        
        /* Category Scores */
        .category-scores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .category-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .category-name {
            font-weight: 600;
            font-size: 1rem;
        }
        
        .category-score {
            font-weight: 700;
            font-size: 1.2rem;
        }
        
        .category-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .category-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .category-bar-fill.low { background: #2ecc71; }
        .category-bar-fill.medium { background: #f1c40f; }
        .category-bar-fill.high { background: #e74c3c; }
        
        /* Recommendations */
        .recommendations {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
        }
        
        .recommendations-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ccd6f6;
        }
        
        .recommendation-item {
            display: flex;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .recommendation-item:last-child {
            border-bottom: none;
        }
        
        .recommendation-priority {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .recommendation-priority.high { background: #e74c3c; }
        .recommendation-priority.medium { background: #f1c40f; }
        .recommendation-priority.low { background: #2ecc71; }
        
        .recommendation-content h4 {
            font-size: 0.95rem;
            margin-bottom: 5px;
        }
        
        .recommendation-content p {
            font-size: 0.85rem;
            color: #8892b0;
            line-height: 1.5;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.show { display: flex; }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            float: right;
        }
        
        .modal-body {
            clear: both;
            color: #ccd6f6;
            line-height: 1.8;
            margin-top: 20px;
        }
        
        /* Chart */
        .radar-chart {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }
        
        .radar-chart canvas {
            max-width: 100%;
        }
        
        @media (max-width: 768px) {
            .progress-steps { flex-direction: column; align-items: center; }
            .step-connector { display: none; }
            .rating-options { flex-direction: column; }
            .category-scores { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ Startup Risk Assessment</h1>
        <p class="subtitle">创业风险评估工具 | 识别关键风险点</p>
        
        <!-- Progress Steps -->
        <div class="progress-steps">
            <div class="progress-step active" id="step1">
                <div class="step-number">1</div>
                <span>基本信息</span>
            </div>
            <div class="step-connector"></div>
            <div class="progress-step" id="step2">
                <div class="step-number">2</div>
                <span>风险评估</span>
            </div>
            <div class="step-connector"></div>
            <div class="progress-step" id="step3">
                <div class="step-number">3</div>
                <span>结果分析</span>
            </div>
        </div>
        
        <!-- Step 1: Basic Info -->
        <div class="assessment-form" id="step1Content">
            <div class="section-title">📋 项目基本信息</div>
            
            <div class="question-group">
                <div class="question-label">项目赛道</div>
                <div class="rating-options">
                    <div class="rating-option" onclick="selectOption(this, 'industry', 'saas')">SaaS</div>
                    <div class="rating-option" onclick="selectOption(this, 'industry', 'ecommerce')">电商</div>
                    <div class="rating-option" onclick="selectOption(this, 'industry', 'consumer')">消费互联网</div>
                    <div class="rating-option" onclick="selectOption(this, 'industry', 'hardware')">硬件</div>
                    <div class="rating-option" onclick="selectOption(this, 'industry', 'fintech')">金融科技</div>
                </div>
            </div>
            
            <div class="question-group">
                <div class="question-label">发展阶段</div>
                <div class="rating-options">
                    <div class="rating-option" onclick="selectOption(this, 'stage', 'concept')">概念期</div>
                    <div class="rating-option" onclick="selectOption(this, 'stage', 'mvp')">MVP期</div>
                    <div class="rating-option" onclick="selectOption(this, 'stage', 'growth')">成长期</div>
                    <div class="rating-option" onclick="selectOption(this, 'stage', 'scale')">规模化</div>
                </div>
            </div>
            
            <div class="question-group">
                <div class="question-label">融资阶段</div>
                <div class="rating-options">
                    <div class="rating-option" onclick="selectOption(this, 'funding', 'none')">未融资</div>
                    <div class="rating-option" onclick="selectOption(this, 'funding', 'seed')">种子轮</div>
                    <div class="rating-option" onclick="selectOption(this, 'funding', 'a')">A轮</div>
                    <div class="rating-option" onclick="selectOption(this, 'funding', 'b')">B轮+</div>
                </div>
            </div>
            
            <div class="btn-row">
                <button class="btn btn-primary" onclick="goToStep(2)">开始评估 →</button>
            </div>
        </div>
        
        <!-- Step 2: Risk Assessment -->
        <div class="assessment-form" id="step2Content" style="display:none;">
            <div class="section-title">📊 风险评估</div>
            
            <div id="riskQuestions"></div>
            
            <div class="btn-row">
                <button class="btn btn-secondary" onclick="goToStep(1)">← 返回</button>
                <button class="btn btn-primary" onclick="calculateResults()">查看结果 →</button>
            </div>
        </div>
        
        <!-- Step 3: Results -->
        <div class="results-panel" id="step3Content">
            <div class="overall-score">
                <div class="score-value" id="overallScore">--</div>
                <div class="score-label" id="scoreLabel">综合风险等级</div>
                <div class="score-description" id="scoreDescription"></div>
            </div>
            
            <div class="category-scores" id="categoryScores"></div>
            
            <div class="recommendations">
                <div class="recommendations-title">🎯 改进建议</div>
                <div id="recommendationsList"></div>
            </div>
            
            <div class="btn-row">
                <button class="btn btn-secondary" onclick="resetAssessment()">重新评估</button>
            </div>
        </div>
    </div>
    
    <script>
        // Data
        const projectInfo = { industry: '', stage: '', funding: '' };
        const riskAnswers = {};
        
        const riskCategories = [
            {
                id: 'market',
                name: '市场风险',
                questions: [
                    { id: 'market_1', text: '用户是否有明确的付费意愿？', hint: '用户愿意为解决方案付费' },
                    { id: 'market_2', text: '目标市场规模是否清晰？', hint: 'SAM/SOM明确' },
                    { id: 'market_3', text: '进入市场时机是否合适？', hint: '不太早不太晚' }
                ]
            },
            {
                id: 'product',
                name: '产品风险',
                questions: [
                    { id: 'product_1', text: '是否已验证产品市场匹配？', hint: '用户留存稳定' },
                    { id: 'product_2', text: '产品是否聚焦核心功能？', hint: '无功能蔓延' },
                    { id: 'product_3', text: '用户体验是否流畅？', hint: 'NPS > 30' }
                ]
            },
            {
                id: 'team',
                name: '团队风险',
                questions: [
                    { id: 'team_1', text: '团队能力是否互补？', hint: '技术+商业兼备' },
                    { id: 'team_2', text: '创始人之间是否共识？', hint: '无重大分歧' },
                    { id: 'team_3', text: '关键岗位是否有备份？', hint: '无单点依赖' }
                ]
            },
            {
                id: 'finance',
                name: '财务风险',
                questions: [
                    { id: 'finance_1', text: '单位经济是否健康？', hint: 'LTV/CAC > 3' },
                    { id: 'finance_2', text: 'Runway是否充足？', hint: '> 12个月' },
                    { id: 'finance_3', text: 'Burn Rate是否可控？', hint: '波动 < 20%' }
                ]
            }
        ];
        
        const recommendations = {
            market: [
                { threshold: 2, priority: 'high', title: '市场验证不足', desc: '建议进行至少20个用户付费访谈，验证真实需求' },
                { threshold: 4, priority: 'medium', title: '市场定位待优化', desc: '明确目标客户画像，聚焦细分市场' }
            ],
            product: [
                { threshold: 2, priority: 'high', title: '产品市场匹配缺失', desc: '回到用户，持续迭代直到达成PMF' },
                { threshold: 4, priority: 'medium', title: '产品体验待改进', desc: '关注NPS，收集用户反�' }
            ],
            team: [
                { threshold: 2, priority: 'high', title: '团队能力短板', desc: '识别核心能力缺口，通过招聘/培训补足' },
                { threshold: 4, priority: 'medium', title: '团队协作待加强', desc: '建立清晰的决策机制和沟通流程' }
            ],
            finance: [
                { threshold: 2, priority: 'high', title: '财务状况堪忧', desc: '立即启动融资，或大幅削减开支' },
                { threshold: 4, priority: 'medium', title: '单位经济待优化', desc: '分析CAC组成，降低获客成本' }
            ]
        };
        
        function selectOption(el, type, value) {
            const parent = el.parentElement;
            parent.querySelectorAll('.rating-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            projectInfo[type] = value;
        }
        
        function goToStep(step) {
            document.querySelectorAll('.progress-step').forEach((s, i) => {
                s.classList.remove('active', 'completed');
                if (i + 1 < step) s.classList.add('completed');
                if (i + 1 === step) s.classList.add('active');
            });
            
            document.getElementById('step1Content').style.display = step === 1 ? 'block' : 'none';
            document.getElementById('step2Content').style.display = step === 2 ? 'block' : 'none';
            
            if (step === 2) {
                renderRiskQuestions();
            }
        }
        
        function renderRiskQuestions() {
            const container = document.getElementById('riskQuestions');
            container.innerHTML = riskCategories.map(cat => `
                <div style="margin-bottom: 30px;">
                    <div class="section-title" style="font-size: 1.1rem; margin-bottom: 15px;">
                        ${getCategoryIcon(cat.id)} ${cat.name}
                    </div>
                    ${cat.questions.map(q => `
                        <div class="question-group">
                            <div class="question-label">${q.text}</div>
                            <div class="question-hint">${q.hint}</div>
                            <div class="rating-options">
                                <div class="rating-option risk-1" onclick="selectRiskOption(this, '${q.id}', 1)">
                                    <div class="rating-label">1</div>
                                    <div class="rating-desc">极低风险</div>
                                </div>
                                <div class="rating-option risk-2" onclick="selectRiskOption(this, '${q.id}', 2)">
                                    <div class="rating-label">2</div>
                                    <div class="rating-desc">低风险</div>
                                </div>
                                <div class="rating-option risk-3" onclick="selectRiskOption(this, '${q.id}', 3)">
                                    <div class="rating-label">3</div>
                                    <div class="rating-desc">中风险</div>
                                </div>
                                <div class="rating-option risk-4" onclick="selectRiskOption(this, '${q.id}', 4)">
                                    <div class="rating-label">4</div>
                                    <div class="rating-desc">高风险</div>
                                </div>
                                <div class="rating-option risk-5" onclick="selectRiskOption(this, '${q.id}', 5)">
                                    <div class="rating-label">5</div>
                                    <div class="rating-desc">极高风险</div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }
        
        function getCategoryIcon(id) {
            const icons = { market: '📊', product: '💡', team: '👥', finance: '💰' };
            return icons[id] || '📋';
        }
        
        function selectRiskOption(el, questionId, value) {
            const parent = el.parentElement;
            parent.querySelectorAll('.rating-option').forEach(o => {
                o.classList.remove('selected', 'risk-1', 'risk-2', 'risk-3', 'risk-4', 'risk-5');
            });
            el.classList.add('selected', `risk-${value}`);
            riskAnswers[questionId] = value;
        }
        
        function calculateResults() {
            const categoryScores = {};
            
            riskCategories.forEach(cat => {
                let total = 0;
                let count = 0;
                cat.questions.forEach(q => {
                    if (riskAnswers[q.id]) {
                        total += riskAnswers[q.id];
                        count++;
                    }
                });
                categoryScores[cat.id] = count > 0 ? (total / count) : 0;
            });
            
            let overallTotal = 0;
            let overallCount = 0;
            Object.values(categoryScores).forEach(score => {
                if (score > 0) {
                    overallTotal += score;
                    overallCount++;
                }
            });
            const overall = overallCount > 0 ? (overallTotal / overallCount) : 0;
            
            displayResults(overall, categoryScores);
            goToStep(3);
            document.getElementById('step3Content').classList.add('show');
        }
        
        function displayResults(overall, categoryScores) {
            const scoreEl = document.getElementById('overallScore');
            const labelEl = document.getElementById('scoreLabel');
            const descEl = document.getElementById('scoreDescription');
            
            scoreEl.textContent = overall.toFixed(1);
            scoreEl.className = 'score-value ' + getScoreClass(overall);
            
            let status, desc;
            if (overall <= 2) {
                status = '✅ 低风险';
                desc = '你的项目整体风险较低，继续保持当前策略，专注于规模化。';
            } else if (overall <= 3.5) {
                status = '⚠️ 中等风险';
                desc = '你的项目存在一些风险点，建议重点关注评分较高的维度。';
            } else {
                status = '🚨 高风险';
                desc = '你的项目面临较高风险，需要立即干预。建议优先解决评分最高的维度。';
            }
            
            labelEl.textContent = status;
            descEl.textContent = desc;
            
            const categoryContainer = document.getElementById('categoryScores');
            categoryContainer.innerHTML = riskCategories.map(cat => {
                const score = categoryScores[cat.id];
                const cls = getScoreClass(score);
                return `
                    <div class="category-card">
                        <div class="category-header">
                            <span class="category-name">${getCategoryIcon(cat.id)} ${cat.name}</span>
                            <span class="category-score" style="color: var(--${cls})">${score.toFixed(1)}</span>
                        </div>
                        <div class="category-bar">
                            <div class="category-bar-fill ${cls}" style="width: ${(score / 5) * 100}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
            
            const recsContainer = document.getElementById('recommendationsList');
            const recs = [];
            Object.keys(categoryScores).forEach(catId => {
                const score = categoryScores[catId];
                recommendations[catId].forEach(rec => {
                    if (score <= rec.threshold) {
                        recs.push(rec);
                    }
                });
            });
            
            recs.sort((a, b) => (a.priority === 'high' ? -1 : 1));
            
            recsContainer.innerHTML = recs.slice(0, 5).map(rec => `
                <div class="recommendation-item">
                    <div class="recommendation-priority ${rec.priority}">!</div>
                    <div class="recommendation-content">
                        <h4>${rec.title}</h4>
                        <p>${rec.desc}</p>
                    </div>
                </div>
            `).join('') || '<p style="color: #8892b0;">你的项目风险控制良好！</p>';
        }
        
        function getScoreClass(score) {
            if (score <= 2) return 'low';
            if (score <= 3.5) return 'medium';
            return 'high';
        }
        
        function resetAssessment() {
            Object.keys(projectInfo).forEach(k => projectInfo[k] = '');
            Object.keys(riskAnswers).forEach(k => delete riskAnswers[k]);
            document.getElementById('step3Content').classList.remove('show');
            goToStep(1);
        }
    </script>
</body>
</html>
