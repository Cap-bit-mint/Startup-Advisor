<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Failure Matrix - 创业失败矩阵</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            text-align: center;
            color: #8892b0;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        
        /* Stats Overview */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(233, 69, 96, 0.5);
        }
        
        .stat-card.critical { border-left: 4px solid #e94560; }
        .stat-card.high { border-left: 4px solid #f39c12; }
        .stat-card.medium { border-left: 4px solid #3498db; }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-card.critical .stat-value { color: #e94560; }
        .stat-card.high .stat-value { color: #f39c12; }
        .stat-card.medium .stat-value { color: #3498db; }
        
        .stat-label {
            font-size: 0.85rem;
            color: #8892b0;
        }
        
        /* Filter Section */
        .filter-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .filter-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ccd6f6;
        }
        
        .filter-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-start;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .filter-label {
            font-size: 0.85rem;
            color: #8892b0;
        }
        
        .filter-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        
        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .filter-btn.active {
            background: rgba(233, 69, 96, 0.3);
            border-color: #e94560;
        }
        
        /* Search */
        .search-box {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .search-input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.9rem;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #e94560;
        }
        
        .clear-btn {
            padding: 10px 20px;
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            border-radius: 8px;
            color: #e74c3c;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        
        .clear-btn:hover {
            background: rgba(231, 76, 60, 0.3);
        }
        
        /* Project Input */
        .project-input {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .input-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .input-group {
            flex: 1;
            min-width: 200px;
        }
        
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #8892b0;
            margin-bottom: 8px;
        }
        
        .input-group select,
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
        }
        
        .input-group select:focus,
        .input-group input:focus {
            outline: none;
            border-color: #e94560;
        }
        
        .analyze-btn {
            padding: 14px 32px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            align-self: flex-end;
        }
        
        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }
        
        /* Matrix Container */
        .matrix-container {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .y-labels {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            text-align: right;
            padding-right: 20px;
        }
        
        .y-label {
            font-size: 0.9rem;
            color: #ccd6f6;
            transition: color 0.3s;
        }
        
        .y-label:hover {
            color: #e94560;
        }
        
        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 100px);
            gap: 4px;
            position: relative;
        }
        
        .cell {
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .cell:hover {
            transform: scale(1.02);
            z-index: 10;
        }
        
        .cell.highlighted {
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(233, 69, 96, 0.5); }
            50% { box-shadow: 0 0 30px rgba(233, 69, 96, 0.8); }
        }
        
        .cell.filtered-out {
            opacity: 0.15;
            pointer-events: none;
        }
        
        .cell.search-match {
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.5);
        }
        
        .cell-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }
        
        .cell-value {
            font-size: 1.8rem;
            font-weight: 700;
        }
        
        .cell-rate {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        /* Risk Level Colors */
        .critical { background: linear-gradient(135deg, #e94560, #c73e54); }
        .high { background: linear-gradient(135deg, #f39c12, #d68910); }
        .medium { background: linear-gradient(135deg, #3498db, #2980b9); }
        .low { background: linear-gradient(135deg, #27ae60, #1e8449); }
        
        .x-labels {
            display: flex;
            justify-content: space-around;
            padding-left: 220px;
            margin-top: 10px;
        }
        
        .x-label {
            width: calc(25% - 4px);
            text-align: center;
            font-size: 0.9rem;
            color: #ccd6f6;
        }
        
        /* Match Result */
        .match-result {
            display: none;
            background: rgba(46, 204, 113, 0.1);
            border: 2px solid #2ecc71;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .match-result.show {
            display: block;
        }
        
        .match-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2ecc71;
            margin-bottom: 15px;
        }
        
        .match-item {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .match-item:last-child {
            border-bottom: none;
        }
        
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .match-pattern {
            font-weight: 600;
        }
        
        .match-score {
            color: #2ecc71;
        }
        
        .match-risk {
            font-size: 0.85rem;
            color: #8892b0;
        }
        
        .match-cases {
            font-size: 0.85rem;
            color: #ccd6f6;
            margin-top: 5px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 30px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .modal-body {
            color: #ccd6f6;
            line-height: 1.8;
        }
        
        .case-list {
            margin-top: 15px;
        }
        
        .case-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .case-name {
            font-weight: 600;
            color: #e94560;
        }
        
        .case-year {
            color: #8892b0;
            font-size: 0.85rem;
        }
        
        .case-lesson {
            margin-top: 8px;
            font-size: 0.9rem;
        }
        
        /* Legend */
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        /* Filtered count */
        .filter-count {
            text-align: center;
            color: #8892b0;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .filter-count strong {
            color: #e94560;
        }
        
        /* Tooltip */
        .tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            max-width: 300px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .tooltip.show {
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            .stats-overview {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .matrix-container {
                grid-template-columns: 1fr;
            }
            
            .y-labels {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-around;
                text-align: center;
                padding-right: 0;
                padding-bottom: 10px;
            }
            
            .x-labels {
                padding-left: 0;
            }
            
            .matrix-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(8, 80px);
            }
            
            .filter-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Startup Failure Matrix</h1>
        <p class="subtitle">创业失败原因分析矩阵 | 基于500+案例统计</p>
        
        <!-- Stats Overview -->
        <div class="stats-overview" id="statsOverview">
            <div class="stat-card critical">
                <div class="stat-value" id="criticalCount">0</div>
                <div class="stat-label">极高风险模式</div>
            </div>
            <div class="stat-card high">
                <div class="stat-value" id="highCount">0</div>
                <div class="stat-label">高风险模式</div>
            </div>
            <div class="stat-card medium">
                <div class="stat-value" id="mediumCount">0</div>
                <div class="stat-label">中风险模式</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalCases">0</div>
                <div class="stat-label">相关案例数</div>
            </div>
        </div>
        
        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-title">🔍 数据筛选</div>
            
            <div class="filter-row">
                <!-- Risk Level Filter -->
                <div class="filter-group">
                    <span class="filter-label">风险等级</span>
                    <div class="filter-options">
                        <button class="filter-btn active" data-filter="all" onclick="filterByRisk('all')">全部</button>
                        <button class="filter-btn" data-filter="critical" onclick="filterByRisk('critical')">极高风险</button>
                        <button class="filter-btn" data-filter="high" onclick="filterByRisk('high')">高风险</button>
                        <button class="filter-btn" data-filter="medium" onclick="filterByRisk('medium')">中风险</button>
                    </div>
                </div>
                
                <!-- Category Filter -->
                <div class="filter-group">
                    <span class="filter-label">失败类别</span>
                    <div class="filter-options">
                        <button class="filter-btn active" data-category="all" onclick="filterByCategory('all')">全部</button>
                        <button class="filter-btn" data-category="market" onclick="filterByCategory('market')">市场</button>
                        <button class="filter-btn" data-category="product" onclick="filterByCategory('product')">产品</button>
                        <button class="filter-btn" data-category="team" onclick="filterByCategory('team')">团队</button>
                        <button class="filter-btn" data-category="operation" onclick="filterByCategory('operation')">运营</button>
                    </div>
                </div>
                
                <!-- Stage Filter -->
                <div class="filter-group">
                    <span class="filter-label">发展阶段</span>
                    <div class="filter-options">
                        <button class="filter-btn active" data-stage="all" onclick="filterByStage('all')">全部</button>
                        <button class="filter-btn" data-stage="concept" onclick="filterByStage('concept')">概念期</button>
                        <button class="filter-btn" data-stage="mvp" onclick="filterByStage('mvp')">MVP期</button>
                        <button class="filter-btn" data-stage="growth" onclick="filterByStage('growth')">成长期</button>
                        <button class="filter-btn" data-stage="scale" onclick="filterByStage('scale')">规模化</button>
                    </div>
                </div>
                
                <!-- Year Filter -->
                <div class="filter-group">
                    <span class="filter-label">案例年代</span>
                    <div class="filter-options">
                        <button class="filter-btn active" data-year="all" onclick="filterByYear('all')">全部</button>
                        <button class="filter-btn" data-year="2000s" onclick="filterByYear('2000s')">2000s</button>
                        <button class="filter-btn" data-year="2010s" onclick="filterByYear('2010s')">2010s</button>
                        <button class="filter-btn" data-year="2020s" onclick="filterByYear('2020s')">2020s</button>
                    </div>
                </div>
            </div>
            
            <!-- Search -->
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索案例、公司名称或失败模式..." oninput="searchCells()">
                <button class="clear-btn" onclick="clearFilters()">清除筛选</button>
            </div>
        </div>
        
        <!-- Filtered Count -->
        <div class="filter-count" id="filterCount">
            显示 <strong>0</strong> / 16 个模式
        </div>
        
        <!-- Project Input -->
        <div class="project-input">
            <div class="input-row">
                <div class="input-group">
                    <label>项目赛道</label>
                    <select id="industry">
                        <option value="">选择赛道...</option>
                        <option value="saas">SaaS</option>
                        <option value="ecommerce">电商/D2C</option>
                        <option value="consumer">消费互联网</option>
                        <option value="hardware">硬件/IoT</option>
                        <option value="healthcare">医疗健康</option>
                        <option value="fintech">金融科技</option>
                        <option value="sharing">共享经济</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>发展阶段</label>
                    <select id="stage">
                        <option value="">选择阶段...</option>
                        <option value="concept">概念期</option>
                        <option value="mvp">MVP期</option>
                        <option value="growth">成长期</option>
                        <option value="scale">规模化期</option>
                    </select>
                </div>
                <button class="analyze-btn" onclick="analyze()">🔍 风险匹配分析</button>
            </div>
        </div>
        
        <!-- Match Result -->
        <div class="match-result" id="matchResult">
            <div class="match-title">🎯 匹配到的高风险模式</div>
            <div id="matchList"></div>
        </div>
        
        <div class="matrix-container">
            <div class="y-labels">
                <div class="y-label" data-category="market">市场问题</div>
                <div class="y-label" data-category="product">需求问题</div>
                <div class="y-label" data-category="team">团队问题</div>
                <div class="y-label" data-category="operation">运营问题</div>
            </div>
            
            <div class="matrix-grid" id="matrix">
                <!-- Cells will be generated by JS -->
            </div>
        </div>
        
        <div class="x-labels">
            <div class="x-label">概念期</div>
            <div class="x-label">MVP期</div>
            <div class="x-label">成长期</div>
            <div class="x-label">规模化</div>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color critical"></div>
                <span>极高风险 (60%+ 失败率)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color high"></div>
                <span>高风险 (40-60%)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color medium"></div>
                <span>中风险 (20-40%)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color low"></div>
                <span>低风险 (<20%)</span>
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">案例详情</div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Case details will be inserted here -->
            </div>
        </div>
    </div>
    
    <div class="tooltip" id="tooltip"></div>
    
    <script>
        // Matrix Data with extended information
        const matrixData = [
            // Row 1: 市场问题
            [
                { 
                    title: "过度烧钱", 
                    value: "68%", 
                    category: "market",
                    risk: "critical",
                    stage: "concept",
                    cases: [
                        { name: "Quibi", year: "2020", lesson: "6个月烧完$1.75B，产品未经验证就大规模投放" },
                        { name: "Juicero", year: "2017", lesson: "硬件公司过度投入生产，忽视市场需求验证" },
                        { name: "Webvan", year: "2001", lesson: "电商物流基础设施过度投资" }
                    ]
                },
                { 
                    title: "融资失误", 
                    value: "72%", 
                    category: "market",
                    risk: "critical",
                    stage: "mvp",
                    cases: [
                        { name: "WeWork", year: "2019", lesson: "IPO前估值泡沫，融资条款苛刻" },
                        { name: "Theranos", year: "2018", lesson: "长期欺骗投资人" }
                    ]
                },
                { 
                    title: "资金断裂", 
                    value: "75%", 
                    category: "market",
                    risk: "critical",
                    stage: "growth",
                    cases: [
                        { name: "Pets.com", year: "2000", lesson: "IPO后仅9个月破产，商业模式不可行" },
                        { name: "Webvan", year: "2001", lesson: "扩张速度远超市场需求，资金耗尽" },
                        { name: "Jawbone", year: "2017", lesson: "资金耗尽，无法获得新融资" }
                    ]
                },
                { 
                    title: "扩张失控", 
                    value: "65%", 
                    category: "market",
                    risk: "high",
                    stage: "scale",
                    cases: [
                        { name: "Fab.com", year: "2015", lesson: "多个市场同步扩张，资源分散" },
                        { name: "Homejoy", year: "2015", lesson: "快速扩张导致法律风险暴露" }
                    ]
                }
            ],
            // Row 2: 需求问题
            [
                { 
                    title: "伪需求", 
                    value: "42%", 
                    category: "product",
                    risk: "medium",
                    stage: "concept",
                    cases: [

                    cases: [

                    ]
                },
                {

                        { name: "WeWork", year: "2019", lesson: "公司治理结构混乱" }
                    ]
                }
            ],
            // Row 4: 运营问题
            [
                { 
                    title: "方向模糊", 
                    value: "38%", 
                    category: "operation",
                    risk: "medium",
                    stage: "concept",
                    cases: [
                        { name: "Color Labs", year: "2012", lesson: "产品定位不清，从社交转向音乐" },
                        { name: "Secret", year: "2015", lesson: "产品方向频繁变化" }
                    ]
                },
                { 
                    title: "体验不佳", 
                    value: "45%", 
                    category: "operation",
                    risk: "medium",
                    stage: "mvp",
                    cases: [
                        { name: "Color Labs", year: "2012", lesson: "产品体验差，用户留存低" },
                        { name: "Quibi", year: "2020", lesson: "用户体验设计失误" }
                    ]
                },
                { 
                    title: "技术债务", 
                    value: "42%", 
                    category: "operation",
                    risk: "medium",
                    stage: "growth",
                    cases: [
                        { name: "多家Startup", year: "各年", lesson: "快速迭代导致技术债累积" },
                        { name: "Vine", year: "2017", lesson: "产品更新停滞" }
                    ]
                },
                { 
                    title: "创新停滞", 
                    value: "35%", 
                    category: "operation",
                    risk: "medium",
                    stage: "scale",
                    cases: [
                        { name: "RIM/BlackBerry", year: "2013", lesson: "创新停滞，被智能手机颠覆" },
                        { name: "Pebble", year: "2016", lesson: "产品迭代缓慢，被Apple Watch超越" }
                    ]
                }
            ]
        ];
        
        const tooltip = document.getElementById('tooltip');
        const matrix = document.getElementById('matrix');
        const modal = document.getElementById('modal');
        
        let currentRiskFilter = 'all';
        let currentCategoryFilter = 'all';
        let currentStageFilter = 'all';
        let currentYearFilter = 'all';
        let searchQuery = '';
        
        function getRiskClass(value) {
            const num = parseInt(value);
            if (num >= 60) return 'critical';
            if (num >= 40) return 'high';
            if (num >= 20) return 'medium';
            return 'low';
        }
        
        function initMatrix() {
            matrix.innerHTML = '';
            matrixData.forEach((row, rowIndex) => {
                row.forEach((cell, colIndex) => {
                    const cellEl = document.createElement('div');
                    const riskClass = getRiskClass(cell.value);
                    cellEl.className = `cell ${riskClass}`;
                    cellEl.dataset.risk = cell.risk;
                    cellEl.dataset.category = cell.category;
                    cellEl.dataset.stage = cell.stage;
                    cellEl.dataset.title = cell.title.toLowerCase();
                    cellEl.dataset.cases = cell.cases.map(c => `${c.name} ${c.lesson}`.toLowerCase()).join(' ');
                    cellEl.innerHTML = `
                        <div class="cell-title">${cell.title}</div>
                        <div class="cell-value">${cell.value}</div>
                        <div class="cell-rate">失败率</div>
                    `;
                    
                    cellEl.addEventListener('mouseenter', (e) => {
                        const caseNames = cell.cases.map(c => `${c.name} (${c.year})`).join('<br>');
                        tooltip.innerHTML = `
                            <strong>${cell.title}</strong><br>
                            <span style="color: #8892b0;">风险: ${cell.risk === 'critical' ? '极高' : cell.risk === 'high' ? '高' : '中'}</span><br><br>
                            <span style="color: #2ecc71;">相关案例:</span><br>${caseNames}
                        `;
                        tooltip.classList.add('show');
                    });
                    
                    cellEl.addEventListener('mousemove', (e) => {
                        tooltip.style.left = (e.clientX + 15) + 'px';
                        tooltip.style.top = (e.clientY + 15) + 'px';
                    });
                    
                    cellEl.addEventListener('mouseleave', () => {
                        tooltip.classList.remove('show');
                    });
                    
                    cellEl.addEventListener('click', () => {
                        showModal(cell);
                    });
                    
                    matrix.appendChild(cellEl);
                });
            });
            updateStats();
            applyFilters();
        }
        
        function updateStats() {
            const allCells = matrixData.flat();
            let criticalCount = 0;
            let highCount = 0;
            let mediumCount = 0;
            let totalCases = 0;
            
            allCells.forEach(cell => {
                if (cell.risk === 'critical') criticalCount++;
                if (cell.risk === 'high') highCount++;
                if (cell.risk === 'medium') mediumCount++;
                totalCases += cell.cases.length;
            });
            
            document.getElementById('criticalCount').textContent = criticalCount;
            document.getElementById('highCount').textContent = highCount;
            document.getElementById('mediumCount').textContent = mediumCount;
            document.getElementById('totalCases').textContent = totalCases;
        }
        
        function filterByRisk(risk) {
            currentRiskFilter = risk;
            document.querySelectorAll('[data-filter]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === risk);
            });
            applyFilters();
        }
        
        function filterByCategory(category) {
            currentCategoryFilter = category;
            document.querySelectorAll('[data-category]').forEach(btn => {
                if (btn.dataset.category) {
                    btn.classList.toggle('active', btn.dataset.category === category);
                }
            });
            applyFilters();
        }
        
        function filterByStage(stage) {
            currentStageFilter = stage;
            document.querySelectorAll('[data-stage]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.stage === stage);
            });
            applyFilters();
        }
        
        function filterByYear(year) {
            currentYearFilter = year;
            document.querySelectorAll('[data-year]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.year === year);
            });
            applyFilters();
        }
        
        function searchCells() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase();
            applyFilters();
        }
        
        function applyFilters() {
            let visibleCount = 0;
            
            document.querySelectorAll('.cell').forEach(cell => {
                const riskMatch = currentRiskFilter === 'all' || cell.dataset.risk === currentRiskFilter;
                const categoryMatch = currentCategoryFilter === 'all' || cell.dataset.category === currentCategoryFilter;
                const stageMatch = currentStageFilter === 'all' || cell.dataset.stage === currentStageFilter;
                
                let yearMatch = true;
                if (currentYearFilter !== 'all') {
                    const cellYears = matrixData.flat().find(c => c.title.toLowerCase() === cell.dataset.title)?.cases || [];
                    if (currentYearFilter === '2000s') {
                        yearMatch = cellYears.some(c => parseInt(c.year) >= 2000 && parseInt(c.year) < 2010);
                    } else if (currentYearFilter === '2010s') {
                        yearMatch = cellYears.some(c => parseInt(c.year) >= 2010 && parseInt(c.year) < 2020);
                    } else if (currentYearFilter === '2020s') {
                        yearMatch = cellYears.some(c => parseInt(c.year) >= 2020);
                    }
                }
                
                let searchMatch = true;
                if (searchQuery) {
                    searchMatch = cell.dataset.title.includes(searchQuery) || 
                                  cell.dataset.cases.includes(searchQuery);
                }
                
                const isVisible = riskMatch && categoryMatch && stageMatch && yearMatch && searchMatch;
                cell.classList.toggle('filtered-out', !isVisible);
                
                if (isVisible) visibleCount++;
            });
            
            document.getElementById('filterCount').innerHTML = `显示 <strong>${visibleCount}</strong> / 16 个模式`;
        }
        
        function clearFilters() {
            currentRiskFilter = 'all';
            currentCategoryFilter = 'all';
            currentStageFilter = 'all';
            currentYearFilter = 'all';
            searchQuery = '';
            
            document.getElementById('searchInput').value = '';
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.filter === 'all' || btn.dataset.category === 'all' || 
                    btn.dataset.stage === 'all' || btn.dataset.year === 'all') {
                    btn.classList.add('active');
                }
            });
            
            applyFilters();
        }
        
        function showModal(cell) {
            document.getElementById('modalTitle').textContent = `${cell.title} (${cell.value} 失败率)`;
            
            const categoryMap = { market: '市场问题', product: '需求问题', team: '团队问题', operation: '运营问题' };
            const riskMap = { critical: '极高', high: '高', medium: '中', low: '低' };
            
            const casesHtml = cell.cases.map(c => `
                <div class="case-item">
                    <div class="case-name">${c.name}</div>
                    <div class="case-year">${c.year}</div>
                    <div class="case-lesson">${c.lesson}</div>
                </div>
            `).join('');
            
            document.getElementById('modalBody').innerHTML = `
                <p><strong>类别:</strong> ${categoryMap[cell.category]}</p>
                <p><strong>风险等级:</strong> ${riskMap[cell.risk]}</p>
                <p><strong>高发阶段:</strong> ${cell.stage === 'concept' ? '概念期' : 
                    cell.stage === 'mvp' ? 'MVP期' : 
                    cell.stage === 'growth' ? '成长期' : '规模化期'}</p>
                <h3 style="margin-top: 20px; margin-bottom: 10px;">相关案例 (${cell.cases.length}个)</h3>
                <div class="case-list">${casesHtml}</div>
            `;
            
            modal.classList.add('show');
        }
        
        function closeModal() {
            modal.classList.remove('show');
        }
        
        function analyze() {
            const industry = document.getElementById('industry').value;
            const stage = document.getElementById('stage').value;
            const matchResult = document.getElementById('matchResult');
            const matchList = document.getElementById('matchList');
            
            if (!industry && !stage) {
                matchResult.classList.remove('show');
                return;
            }
            
            // Clear previous highlights
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('highlighted');
            });
            
            // Industry to category mapping
            const industryMap = {
                saas: ['market', 'product'],
                ecommerce: ['market', 'operation'],
                consumer: ['product', 'operation'],
                hardware: ['market', 'team'],
                healthcare: ['market', 'team'],
                fintech: ['market', 'team'],
                sharing: ['market', 'operation']
            };
            
            const stageMap = {
                concept: 'concept',
                mvp: 'mvp',
                growth: 'growth',
                scale: 'scale'
            };
            
            const matches = [];
            matrixData.flat().forEach(cell => {
                let score = 0;
                
                // Category match
                if (industry && industryMap[industry]?.includes(cell.category)) {
                    score += 30;
                }
                
                // Stage match
                if (stage && cell.stage === stageMap[stage]) {
                    score += 40;
                }
                
                // Risk weight
                if (cell.risk === 'critical') score += 20;
                if (cell.risk === 'high') score += 15;
                
                if (score > 50) {
                    matches.push({
                        pattern: cell.title,
                        score: Math.min(score, 100),
                        risk: cell.risk,
                        cases: cell.cases.map(c => `${c.name} (${c.year})`).join(', ')
                    });
                }
            });
            
            matches.sort((a, b) => b.score - a.score);
            
            if (matches.length > 0) {
                matchList.innerHTML = matches.map((m, i) => `
                    <div class="match-item">
                        <div class="match-header">
                            <span class="match-pattern">${i + 1}. ${m.pattern}</span>
                            <span class="match-score">匹配度 ${m.score}%</span>
                        </div>
                        <div class="match-risk">风险等级: ${m.risk === 'critical' ? '极高' : m.risk === 'high' ? '高' : '中'}</div>
                        <div class="match-cases">案例: ${m.cases}</div>
                    </div>
                `).join('');
                matchResult.classList.add('show');
                
                // Highlight matched cells
                matches.forEach(m => {
                    document.querySelectorAll('.cell').forEach(cell => {
                        if (cell.dataset.title === m.pattern.toLowerCase()) {
                            cell.classList.add('highlighted');
                        }
                    });
                });
            } else {
                matchList.innerHTML = '<p style="color: #8892b0;">未找到高匹配度的风险模式</p>';
                matchResult.classList.add('show');
            }
        }
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
        
        initMatrix();
    </script>
