<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风险评估 - Startup-Advisor</title>
    <link rel="stylesheet" href="../css/theme.css">
    <style>
        /* 风险评估专属样式 */
        .step-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .step-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .step-num {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 2px solid var(--border-default);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            transition: all var(--transition-fast);
        }
        
        .step-item.active .step-num {
            background: var(--color-primary);
            border-color: var(--color-primary);
        }
        
        .step-item.completed .step-num {
            background: var(--color-success);
            border-color: var(--color-success);
        }
        
        .step-line {
            width: 60px;
            height: 2px;
            background: var(--border-default);
        }
        
        .step-line.active {
            background: var(--color-primary);
        }
        
        /* 表单区域 */
        .form-section {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-lg);
        }
        
        .form-section h3 {
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 问题组 */
        .question-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-md);
            border-left: 4px solid var(--border-default);
        }
        
        .question-card.active-risk {
            border-left-color: var(--color-danger);
        }
        
        .question-text {
            font-size: 1.05rem;
            margin-bottom: var(--spacing-md);
            font-weight: 500;
        }
        
        .rating-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        
        @media (max-width: 600px) {
            .rating-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .rating-btn {
            padding: 12px 8px;
            border: 2px solid var(--border-default);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            cursor: pointer;
            transition: all var(--transition-fast);
            text-align: center;
        }
        
        .rating-btn:hover {
            border-color: var(--color-primary);
            background: rgba(233, 69, 96, 0.1);
        }
        
        .rating-btn.selected {
            border-color: var(--color-primary);
            background: rgba(233, 69, 96, 0.2);
        }
        
        .rating-btn.selected.r1 { border-color: #2ecc71; background: rgba(46, 204, 113, 0.2); }
        .rating-btn.selected.r2 { border-color: #27ae60; background: rgba(39, 174, 96, 0.2); }
        .rating-btn.selected.r3 { border-color: #f1c40f; background: rgba(241, 196, 15, 0.2); }
        .rating-btn.selected.r4 { border-color: #e67e22; background: rgba(230, 126, 34, 0.2); }
        .rating-btn.selected.r5 { border-color: #e74c3c; background: rgba(231, 76, 60, 0.2); }
        
        .rating-label {
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .rating-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        /* 结果区域 */
        .result-section {
            text-align: center;
            padding: var(--spacing-xl);
        }
        
        .overall-score {
            font-size: 5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        
        .score-label {
            font-size: 1.5rem;
            margin: var(--spacing-md) 0;
        }
        
        .score-description {
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto var(--spacing-xl);
        }
        
        /* 维度评分 */
        .category-scores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
            margin: var(--spacing-xl) 0;
        }
        
        .category-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            text-align: left;
        }
        
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-sm);
        }
        
        .category-name {
            font-weight: 600;
        }
        
        .category-score {
            font-weight: 700;
            font-size: 1.2rem;
        }
        
        .category-bar {
            height: 8px;
            background: var(--border-default);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .category-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .category-bar-fill.low { background: #2ecc71; }
        .category-bar-fill.medium { background: #f39c12; }
        .category-bar-fill.high { background: #e74c3c; }
        
        /* 建议列表 */
        .recommendations {
            text-align: left;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            margin-top: var(--spacing-xl);
        }
        
        .recommendations h4 {
            margin-bottom: var(--spacing-md);
        }
        
        .recommendation-item {
            display: flex;
            gap: var(--spacing-md);
            padding: var(--spacing-md) 0;
            border-bottom: 1px solid var(--border-default);
        }
        
        .recommendation-item:last-child {
            border-bottom: none;
        }
        
        .priority-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 700;
        }
        
        .priority-icon.high {
            background: rgba(231, 76, 60, 0.2);
            color: var(--color-danger);
        }
        
        .priority-icon.medium {
            background: rgba(243, 156, 18, 0.2);
            color: var(--color-warning);
        }
        
        .recommendation-content h5 {
            margin-bottom: 4px;
        }
        
        .recommendation-content p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        /* 导出按钮 */
        .export-actions {
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
            margin-top: var(--spacing-xl);
        }
    </style>
</head>
<body>
    <div class="container-narrow">
        <h1 class="title-gradient-primary text-center">⚠️ 创业风险评估</h1>
        <p class="text-center text-muted" style="margin-bottom: 30px;">
            5大维度 × 15个问题 | 量化评估创业风险等级
        </p>
        
        <!-- 步骤指示器 -->
        <div class="step-indicator">
            <div class="step-item active" id="step1">
                <span class="step-num">1</span>
                <span>基本信息</span>
            </div>
            <div class="step-line" id="line1"></div>
            <div class="step-item" id="step2">
                <span class="step-num">2</span>
                <span>风险评估</span>
            </div>
            <div class="step-line" id="line2"></div>
            <div class="step-item" id="step3">
                <span class="step-num">3</span>
                <span>结果分析</span>
            </div>
        </div>
        
        <!-- 步骤1: 基本信息 -->
        <div id="step1Content" class="form-section">
            <h3>📋 项目基本信息</h3>
            
            <div class="form-group">
                <label class="form-label">项目名称</label>
                <input type="text" class="form-input" id="projectName" placeholder="输入项目名称（可选）">
            </div>
            
            <div class="form-group">
                <label class="form-label">所在行业</label>
                <select class="form-input form-select" id="industry">
                    <option value="">请选择行业</option>
                    <option value="saas">SaaS / B2B</option>
                    <option value="ecommerce">电商 / 零售</option>
                    <option value="consumer">消费 / 社交</option>
                    <option value="hardware">硬件 / IoT</option>
                    <option value="healthcare">医疗 / 健康</option>
                    <option value="fintech">金融 / 支付</option>
                    <option value="sharing">共享经济</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">发展阶段</label>
                <select class="form-input form-select" id="stage">
                    <option value="">请选择阶段</option>
                    <option value="concept">概念期</option>
                    <option value="mvp">MVP期</option>
                    <option value="growth">成长期</option>
                    <option value="scale">规模化期</option>
                </select>
            </div>
            
            <div class="btn-row">
                <button class="btn btn-primary" onclick="goToStep(2)">下一步 →</button>
            </div>
        </div>
        
        <!-- 步骤2: 风险评估 -->
        <div id="step2Content" class="form-section" style="display: none;">
            <h3>🔍 风险评估问卷</h3>
            <div id="questionsContainer">
                <!-- 动态生成 -->
            </div>
            
            <div class="btn-row">
                <button class="btn btn-secondary" onclick="goToStep(1)">← 上一步</button>
                <button class="btn btn-primary" onclick="calculateResults()">查看结果 →</button>
            </div>
        </div>
        
        <!-- 步骤3: 结果 -->
        <div id="step3Content" class="form-section" style="display: none;">
            <div class="result-section">
                <h2>评估结果</h2>
                
                <div class="overall-score" id="overallScore">0.0</div>
                <div class="score-label" id="scoreLabel">评估中...</div>
                <p class="score-description" id="scoreDescription"></p>
                
                <div class="category-scores" id="categoryScores">
                    <!-- 动态生成 -->
                </div>
                
                <div class="recommendations" id="recommendations">
                    <h4>📋 改进建议</h4>
                    <div id="recommendationsList"></div>
                </div>
                
                <div class="export-actions">
                    <button class="btn btn-secondary" onclick="exportJSON()">📥 导出JSON</button>
                    <button class="btn btn-accent" onclick="resetAssessment()">🔄 重新评估</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        // 状态
        let currentStep = 1;
        let answers = {};
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initQuestions();
            notifyParentReady();
        });
        
        // 通知父窗口
        function notifyParentReady() {
            if (window.parent !== window) {
                window.parent.postMessage({
                    source: 'startup-advisor-visualization',
                    type: 'skill:ready',
                    data: { tool: 'assessment', page: 'assessment.html' }
                }, '*');
            }
        }
        
        // 初始化问题
        function initQuestions() {
            const container = document.getElementById('questionsContainer');
            const categories = StartupAdvisorData.riskAssessment.categories;
            const options = StartupAdvisorData.riskAssessment.ratingOptions;
            
            let html = '';
            
            categories.forEach(cat => {
                html += `<div style="margin-bottom: 30px;">
                    <h4 style="margin-bottom: 15px;">${cat.icon} ${cat.name}</h4>`;
                
                cat.questions.forEach(q => {
                    html += `
                        <div class="question-card" id="q-${cat.id}-${q.id}">
                            <div class="question-text">${q.text}</div>
                            <div class="rating-grid">
                                ${options.map(opt => `
                                    <button class="rating-btn r${opt.value}" 
                                            onclick="selectRating('${cat.id}-${q.id}', ${opt.value})">
                                        <div class="rating-label">${opt.label}</div>
                                        <div class="rating-desc">${opt.desc}</div>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
            });
            
            container.innerHTML = html;
        }
        
        // 选择评分
        function selectRating(questionId, value) {
            answers[questionId] = value;
            
            // 更新UI
            const card = document.getElementById(`q-${questionId}`);
            card.querySelectorAll('.rating-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.classList.contains(`r${value}`)) {
                    btn.classList.add('selected');
                }
            });
        }
        
        // 步骤导航
        function goToStep(step) {
            // 验证当前步骤
            if (step === 2 && currentStep === 1) {
                // 从步骤1到步骤2，检查是否选择了必填项
                const industry = document.getElementById('industry').value;
                const stage = document.getElementById('stage').value;
                if (!industry || !stage) {
                    alert('请先选择行业和发展阶段');
                    return;
                }
            }
            
            currentStep = step;
            
            // 更新步骤指示器
            for (let i = 1; i <= 3; i++) {
                const stepEl = document.getElementById(`step${i}`);
                const lineEl = document.getElementById(`line${i}`);
                
                stepEl.classList.remove('active', 'completed');
                if (i < step) stepEl.classList.add('completed');
                if (i === step) stepEl.classList.add('active');
                
                if (lineEl) {
                    lineEl.classList.remove('active');
                    if (i < step) lineEl.classList.add('active');
                }
            }
            
            // 显示/隐藏内容
            document.getElementById('step1Content').style.display = step === 1 ? 'block' : 'none';
            document.getElementById('step2Content').style.display = step === 2 ? 'block' : 'none';
            document.getElementById('step3Content').style.display = step === 3 ? 'block' : 'none';
        }
        
        // 计算结果
        function calculateResults() {
            const categories = StartupAdvisorData.riskAssessment.categories;
            const categoryScores = {};
            
            // 计算各维度分数
            categories.forEach(cat => {
                const catAnswers = Object.keys(answers)
                    .filter(k => k.startsWith(cat.id + '-'))
                    .map(k => answers[k]);
                
                if (catAnswers.length > 0) {
                    categoryScores[cat.id] = {
                        score: catAnswers.reduce((a, b) => a + b, 0) / catAnswers.length,
                        weight: cat.weight
                    };
                }
            });
            
            // 计算总分
            let overallTotal = 0;
            let count = 0;
            Object.values(categoryScores).forEach(cat => {
                if (cat.score > 0) {
                    overallTotal += cat.score * cat.weight;
                    count++;
                }
            });
            const overall = count > 0 ? overallTotal / count : 0;
            
            // 显示结果
            displayResults(overall, categoryScores);
            goToStep(3);
        }
        
        // 显示结果
        function displayResults(overall, categoryScores) {
            // 总分
            document.getElementById('overallScore').textContent = overall.toFixed(1);
            
            // 评分标签
            let status, description;
            if (overall <= 2) {
                status = '✅ 低风险';
                description = '你的项目整体风险较低，继续保持当前策略，专注于规模化挑战。';
            } else if (overall <= 3.5) {
                status = '⚠️ 中等风险';
                description = '你的项目存在一些风险点，建议重点关注评分较高的维度。';
            } else {
                status = '🚨 高风险';
                description = '你的项目面临较高风险，需要立即干预。建议优先解决评分最高的维度。';
            }
            
            document.getElementById('scoreLabel').textContent = status;
            document.getElementById('scoreDescription').textContent = description;
            
            // 维度评分
            const categories = StartupAdvisorData.riskAssessment.categories;
            const categoryContainer = document.getElementById('categoryScores');
            
            categoryContainer.innerHTML = categories.map(cat => {
                const catScore = categoryScores[cat.id]?.score || 0;
                const scoreClass = catScore <= 2 ? 'low' : catScore <= 3.5 ? 'medium' : 'high';
                const color = catScore <= 2 ? '#2ecc71' : catScore <= 3.5 ? '#f39c12' : '#e74c3c';
                
                return `
                    <div class="category-card">
                        <div class="category-header">
                            <span class="category-name">${cat.icon} ${cat.name}</span>
                            <span class="category-score" style="color: ${color}">${catScore.toFixed(1)}</span>
                        </div>
                        <div class="category-bar">
                            <div class="category-bar-fill ${scoreClass}" style="width: ${(catScore / 5) * 100}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // 建议
            const recommendations = StartupAdvisorData.riskAssessment.recommendations;
            const recs = [];
            
            Object.entries(categoryScores).forEach(([catId, cat]) => {
                if (cat.score > 3) {
                    const rules = recommendations[catId] || [];
                    rules.forEach(rule => {
                        if (cat.score > rule.threshold) {
                            recs.push({ ...rule, category: catId });
                        }
                    });
                }
            });
            
            recs.sort((a, b) => (a.priority === 'high' ? -1 : 1));
            
            document.getElementById('recommendationsList').innerHTML = recs.slice(0, 5).map(rec => `
                <div class="recommendation-item">
                    <div class="priority-icon ${rec.priority}">!</div>
                    <div class="recommendation-content">
                        <h5>${rec.title}</h5>
                        <p>${rec.desc}</p>
                    </div>
                </div>
            `).join('') || '<p style="color: var(--text-muted);">你的项目风险控制良好！</p>';
        }
        
        // 导出JSON
        function exportJSON() {
            const data = {
                project: document.getElementById('projectName').value || '未命名项目',
                industry: document.getElementById('industry').value,
                stage: document.getElementById('stage').value,
                answers: answers,
                timestamp: new Date().toISOString()
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `risk-assessment-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // 重置评估
        function resetAssessment() {
            answers = {};
            document.querySelectorAll('.rating-btn.selected').forEach(btn => {
                btn.classList.remove('selected');
            });
            goToStep(1);
        }
    </script>
</body>
</html>
