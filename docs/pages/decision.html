<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>决策树 - Startup-Advisor</title>
    <link rel="stylesheet" href="../css/theme.css">
    <style>
        /* 决策树专属样式 */
        .tree-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 500px;
        }
        
        .tree-level {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .tree-branch {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .tree-connector {
            width: 2px;
            height: 30px;
            background: var(--border-default);
        }
        
        .tree-connector.horizontal {
            width: 40px;
            height: 2px;
            margin: 0 10px;
        }
        
        .node-content {
            background: var(--bg-card);
            border: 2px solid var(--color-accent);
            border-radius: var(--radius-md);
            padding: 20px 25px;
            text-align: center;
            min-width: 280px;
            max-width: 350px;
            transition: all var(--transition-normal);
        }
        
        .node-content.question:hover {
            background: rgba(100, 255, 218, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(100, 255, 218, 0.2);
        }
        
        .node-content.yes {
            border-color: var(--color-success);
            background: rgba(46, 204, 113, 0.1);
        }
        
        .node-content.no {
            border-color: var(--color-danger);
            background: rgba(231, 76, 60, 0.1);
        }
        
        .node-content.warning {
            border-color: var(--color-warning);
            background: rgba(243, 156, 18, 0.1);
        }
        
        .node-question {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .node-hint {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .node-options {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            justify-content: center;
        }
        
        .branch-label {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all var(--transition-fast);
        }
        
        .branch-label.yes {
            background: rgba(46, 204, 113, 0.2);
            color: var(--color-success);
            border: 1px solid var(--color-success);
        }
        
        .branch-label.yes:hover {
            background: rgba(46, 204, 113, 0.3);
        }
        
        .branch-label.no {
            background: rgba(231, 76, 60, 0.2);
            color: var(--color-danger);
            border: 1px solid var(--color-danger);
        }
        
        .branch-label.no:hover {
            background: rgba(231, 76, 60, 0.3);
        }
        
        .branch-label.selected {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        /* 自测问卷 */
        .quiz-section {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            margin-top: var(--spacing-xl);
        }
        
        .quiz-header {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }
        
        .quiz-progress {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: var(--spacing-xl);
        }
        
        .quiz-step {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--border-default);
            transition: all var(--transition-fast);
        }
        
        .quiz-step.current {
            background: var(--color-accent);
            transform: scale(1.2);
        }
        
        .quiz-step.completed {
            background: var(--color-success);
        }
        
        .quiz-question {
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }
        
        .quiz-question h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }
        
        .quiz-question p {
            color: var(--text-muted);
        }
        
        .quiz-options {
            display: flex;
            justify-content: center;
            gap: var(--spacing-md);
            flex-wrap: wrap;
        }
        
        .quiz-option {
            padding: 15px 30px;
            border-radius: var(--radius-md);
            border: 2px solid var(--border-default);
            background: var(--bg-card);
            cursor: pointer;
            transition: all var(--transition-fast);
            min-width: 150px;
        }
        
        .quiz-option:hover {
            border-color: var(--color-accent);
            transform: translateY(-2px);
        }
        
        .quiz-option.selected.yes {
            border-color: var(--color-success);
            background: rgba(46, 204, 113, 0.2);
        }
        
        .quiz-option.selected.no {
            border-color: var(--color-danger);
            background: rgba(231, 76, 60, 0.2);
        }
        
        .quiz-option.selected.neutral {
            border-color: var(--color-warning);
            background: rgba(243, 156, 18, 0.2);
        }
        
        /* 结果区域 */
        .quiz-result {
            text-align: center;
            padding: var(--spacing-xl);
        }
        
        .result-icon {
            font-size: 4rem;
            margin-bottom: var(--spacing-md);
        }
        
        .result-title {
            font-size: 1.5rem;
            margin-bottom: var(--spacing-sm);
        }
        
        .result-score {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--color-accent);
            margin: var(--spacing-md) 0;
        }
        
        .result-message {
            color: var(--text-muted);
            margin-bottom: var(--spacing-lg);
        }
        
        .result-recommendations {
            text-align: left;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            margin-top: var(--spacing-lg);
        }
        
        .result-recommendations h4 {
            margin-bottom: var(--spacing-md);
        }
        
        .result-recommendations ul {
            padding-left: 20px;
        }
        
        .result-recommendations li {
            margin-bottom: 8px;
            color: var(--text-muted);
        }
        
        /* 交互式流程图 */
        .flowchart-container {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
        }
        
        .tabs {
            margin-bottom: var(--spacing-lg);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title-gradient-accent text-center">🌲 创业决策树</h1>
        <p class="text-center text-muted" style="margin-bottom: 30px;">
            交互式决策流程图 + 自测问卷 | 基于真实失败案例的决策框架
        </p>
        
        <!-- 标签页切换 -->
        <div class="tabs" style="justify-content: center;">
            <button class="tab active" onclick="switchView('flowchart')">📊 决策流程图</button>
            <button class="tab" onclick="switchView('quiz')">📝 自测问卷</button>
        </div>
        
        <!-- 决策流程图视图 -->
        <div id="flowchartView" class="tab-content active">
            <div class="flowchart-container">
                <div class="tree-container" id="treeContainer">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
        
        <!-- 自测问卷视图 -->
        <div id="quizView" class="tab-content">
            <div class="quiz-section">
                <div class="quiz-header">
                    <h2>创业健康度自测</h2>
                    <p class="text-muted">回答6个关键问题，获取个性化建议</p>
                </div>
                
                <div class="quiz-progress" id="quizProgress">
                    <!-- 动态生成 -->
                </div>
                
                <div id="quizContent">
                    <div class="quiz-question">
                        <h3 id="quizQuestion"></h3>
                        <p id="quizHint" class="text-muted"></p>
                    </div>
                    <div class="quiz-options" id="quizOptions">
                        <!-- 动态生成 -->
                    </div>
                </div>
                
                <div id="quizResult" class="quiz-result" style="display: none;">
                    <!-- 结果显示 -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- 详情弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">详情</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>
    
    <script src="../js/data.js"></script>
    <script src="../js/components.js"></script>
    <script>
        // 状态
        let currentNode = 'q1';
        let selectedAnswers = {};
        let score = 0;
        let quizStep = 0;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initFlowchart();
            initQuiz();
            notifyParentReady();
        });
        
        // 通知父窗口
        function notifyParentReady() {
            if (window.parent !== window) {
                window.parent.postMessage({
                    source: 'startup-advisor-visualization',
                    type: 'skill:ready',
                    data: { tool: 'decision', page: 'decision.html' }
                }, '*');
            }
        }
        
        // 视图切换
        function switchView(view) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            
            if (view === 'flowchart') {
                document.getElementById('flowchartView').classList.add('active');
            } else {
                document.getElementById('quizView').classList.add('active');
            }
        }
        
        // 初始化流程图
        function initFlowchart() {
            const container = document.getElementById('treeContainer');
            const nodes = StartupAdvisorData.decisionTree.nodes;
            const failureNodes = StartupAdvisorData.decisionTree.failureNodes;
            const successNode = StartupAdvisorData.decisionTree.successNode;
            
            let html = '';
            
            // Q1 起始节点
            html += renderQuestionNode(nodes[0]);
            
            // 连接线到下一级
            html += `<div class="tree-connector"></div><div class="tree-level">`;
            
            // Q2 和失败节点
            html += `<div class="tree-branch">`;
            html += renderYesBranch(nodes[0], nodes[1]);
            html += `</div>`;
            
            html += `<div class="tree-branch">`;
            html += renderNoBranch(nodes[0], failureNodes['fail-pseudo']);
            html += `</div>`;
            
            html += `</div>`;
            
            container.innerHTML = html;
        }
        
        // 渲染问题节点
        function renderQuestionNode(node) {
            return `
                <div class="tree-branch">
                    <div class="node-content question" onclick="selectNode('${node.id}')">
                        <div class="node-question">${node.question}</div>
                        <div class="node-hint">${node.hint}</div>
                    </div>
                </div>
            `;
        }
        
        // 渲染是分支
        function renderYesBranch(fromNode, toNode) {
            const nextNode = StartupAdvisorData.decisionTree.nodes.find(n => n.id === toNode.id);
            const failureNode = StartupAdvisorData.decisionTree.failureNodes[toNode.id];
            
            let html = `<div class="tree-connector"></div>`;
            
            if (nextNode) {
                html += `
                    <div class="tree-branch">
                        <button class="branch-label yes selected" onclick="answer('${fromNode.id}', 'yes', '${nextNode.id}')">是 ✓</button>
                    </div>
                    <div class="tree-connector"></div>
                    <div class="tree-branch">
                        ${renderQuestionNode(nextNode)}
                    </div>
                `;
            }
            
            return html;
        }
        
        // 渲染否分支
        function renderNoBranch(fromNode, failureNode) {
            let html = `<div class="tree-connector"></div>`;
            
            html += `
                <div class="tree-branch">
                    <button class="branch-label no selected" onclick="showFailure('${fromNode.id}')">否 ✗</button>
                </div>
            `;
            
            return html;
        }
        
        // 选择节点
        function selectNode(nodeId) {
            currentNode = nodeId;
            // 可以添加视觉反馈
            document.querySelectorAll('.node-content').forEach(n => n.classList.remove('selected'));
            event.target.closest('.node-content')?.classList.add('selected');
        }
        
        // 回答问题
        function answer(nodeId, type, nextNodeId) {
            selectedAnswers[nodeId] = type;
            
            if (type === 'yes') {
                score += 2;
                // 显示下一节点
                const container = document.getElementById('treeContainer');
                // 简化：直接跳转到结果
            } else {
                score += 0;
                // 显示失败结果
                showFailure(nodeId);
            }
        }
        
        // 显示失败结果
        function showFailure(nodeId) {
            const question = StartupAdvisorData.decisionTree.nodes.find(n => n.id === nodeId);
            const failKey = 'fail-' + (nodeId === 'q1' ? 'pseudo' : 
                                          nodeId === 'q2' ? 'tam' : 
                                          nodeId === 'q3' ? 'pmf' : 
                                          nodeId === 'q4' ? 'unit' : 
                                          nodeId === 'q5' ? 'team' : 'runway');
            const failure = StartupAdvisorData.decisionTree.failureNodes[failKey];
            
            if (failure) {
                document.getElementById('modalTitle').textContent = failure.title;
                document.getElementById('modalBody').innerHTML = `
                    <div class="result-icon" style="text-align: center; font-size: 3rem;">${failure.icon}</div>
                    <p style="margin-bottom: 20px;">${failure.description}</p>
                    
                    <div style="background: var(--bg-card); padding: 15px; border-radius: 8px;">
                        <h4 style="margin-bottom: 10px;">📋 建议措施</h4>
                        <ul style="padding-left: 20px;">
                            ${failure.recommendations.map(r => `<li style="margin-bottom: 8px;">${r}</li>`).join('')}
                        </ul>
                    </div>
                `;
                document.getElementById('modal').classList.add('show');
            }
        }
        
        // 初始化问卷
        function initQuiz() {
            const progress = document.getElementById('quizProgress');
            const questions = StartupAdvisorData.decisionTree.nodes;
            
            progress.innerHTML = questions.map((_, i) => 
                `<div class="quiz-step" id="step${i}"></div>`
            ).join('');
            
            updateQuizStep();
        }
        
        // 更新问卷步骤
        function updateQuizStep() {
            const questions = StartupAdvisorData.decisionTree.nodes;
            
            // 更新进度
            document.querySelectorAll('.quiz-step').forEach((step, i) => {
                step.classList.remove('current', 'completed');
                if (i < quizStep) step.classList.add('completed');
                if (i === quizStep) step.classList.add('current');
            });
            
            if (quizStep < questions.length) {
                const q = questions[quizStep];
                document.getElementById('quizQuestion').textContent = q.question;
                document.getElementById('quizHint').textContent = q.hint;
                
                document.getElementById('quizOptions').innerHTML = `
                    <div class="quiz-option yes" onclick="selectQuizOption(this, 'yes')">是 ✓</div>
                    <div class="quiz-option no" onclick="selectQuizOption(this, 'no')">否 ✗</div>
                `;
                
                document.getElementById('quizContent').style.display = 'block';
                document.getElementById('quizResult').style.display = 'none';
            } else {
                showQuizResult();
            }
        }
        
        // 选择问卷选项
        function selectQuizOption(el, type) {
            document.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            
            if (type === 'yes') {
                score += 2;
            }
            
            setTimeout(() => {
                quizStep++;
                updateQuizStep();
            }, 500);
        }
        
        // 显示问卷结果
        function showQuizResult() {
            document.getElementById('quizContent').style.display = 'none';
            const resultDiv = document.getElementById('quizResult');
            resultDiv.style.display = 'block';
            
            const maxScore = StartupAdvisorData.decisionTree.nodes.length * 2;
            const percentage = (score / maxScore) * 100;
            
            let icon, status, message, recommendations;
            
            if (percentage >= 80) {
                icon = '🎉';
                status = '✅ 项目健康';
                message = '你的创业项目处于健康状态，继续保持！';
                recommendations = [
                    '关注规模化挑战',
                    '建立竞争壁垒',
                    '持续监控关键指标'
                ];
            } else if (percentage >= 50) {
                icon = '⚠️';
                status = '⚠️ 需要关注';
                message = '存在一些风险点，建议重点关注薄弱环节。';
                recommendations = [
                    '识别核心问题',
                    '制定改进计划',
                    '定期复盘'
                ];
            } else {
                icon = '🚨';
                status = '🚨 高风险';
                message = '多个维度存在问题，需要立即干预。';
                recommendations = [
                    '优先解决核心问题',
                    '寻求导师或顾问帮助',
                    '考虑战略调整'
                ];
            }
            
            resultDiv.innerHTML = `
                <div class="result-icon">${icon}</div>
                <div class="result-title">${status}</div>
                <div class="result-score">${score}/${maxScore} (${percentage.toFixed(0)}%)</div>
                <div class="result-message">${message}</div>
                
                <div class="result-recommendations">
                    <h4>📋 下一步建议</h4>
                    <ul>
                        ${recommendations.map(r => `<li>${r}</li>`).join('')}
                    </ul>
                </div>
                
                <button class="btn btn-accent" onclick="resetQuiz()" style="margin-top: 20px;">
                    🔄 重新测试
                </button>
            `;
        }
        
        // 重置问卷
        function resetQuiz() {
            quizStep = 0;
            score = 0;
            selectedAnswers = {};
            updateQuizStep();
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }
        
        // 点击背景关闭
        document.getElementById('modal')?.addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });
        
        // ESC 关闭
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
